<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nyturals</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
--black:#0a0a0a;
--gold:#d4b06a;
--white:#ffffff;
--muted:#bbbbbb;
}

*{box-sizing:border-box}

body{
margin:0;
font-family:Inter;
background:black;
color:white;
overflow-x:hidden;
}

/* HERO */

.hero{
height:100vh;
position:relative;
display:flex;
align-items:center;
padding:40px;
}

.hero-bg{
position:fixed;
width:100%;
height:100vh;
background:url("images/hero.jpg") center/cover no-repeat;
z-index:-1;
}

.hero-content{max-width:600px}

.hero h1{
font-family:Playfair Display;
font-size:clamp(42px,8vw,80px);
margin:0;
color:var(--gold);
}

.hero p{
font-size:18px;
margin-top:10px;
color:var(--muted);
}

/* SCROLL ARROW */

.scroll-arrow{
position:absolute;
bottom:30px;
left:50%;
transform:translateX(-50%);
font-size:26px;
animation:bounce 2s infinite;
opacity:.7;
}

@keyframes bounce{
0%,100%{transform:translate(-50%,0)}
50%{transform:translate(-50%,10px)}
}

/* SECTIONS */

.section{
height:120vh;
position:relative;
display:flex;
align-items:center;
justify-content:center;
border-top:1px solid rgba(212,176,106,.15);
}

/* BACKGROUND */

.section-bg{
position:absolute;
width:100%;
height:100%;
background-size:cover;
background-position:center;
background-attachment:fixed;
transform:scale(1.1);
z-index:-1;
}

/* DARK CINEMATIC OVERLAY */

.section-bg::after{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:linear-gradient(
to bottom,
rgba(0,0,0,.45),
rgba(0,0,0,.65)
);
}

/* GLASS CARD */

.card{
background:rgba(0,0,0,.55);
padding:40px;
max-width:420px;
backdrop-filter:blur(12px);
box-shadow:
0 20px 60px rgba(0,0,0,.6),
0 0 0 1px rgba(212,176,106,.15);

transform:translateY(0);
transition:transform .35s ease-out;
}

.card h2{
font-family:Playfair Display;
color:var(--gold);
margin:0;
}

.card p{color:var(--muted)}

/* CINEMATIC REVEAL */

.reveal{
opacity:0;
transform:translateY(80px);
transition:
opacity 1s ease,
transform 1s cubic-bezier(.22,1,.36,1);
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

/* MOBILE */

@media(max-width:768px){
.hero{
justify-content:center;
text-align:center;
}
.card{margin:20px}
}
</style>
</head>

<body>

<div class="hero-bg"></div>

<section class="hero reveal">

<div class="hero-content">
<h1>Nyturals</h1>
<p>Luxury Cosmetic Engineering</p>
</div>

<div class="scroll-arrow">↓</div>

</section>

<section class="section reveal">

<div class="section-bg"
style="background-image:url('images/hair.jpg')">
</div>

<div class="card glide">
<h2>Hair Syndet Bar</h2>
<p>Herbal cleansing ritual.</p>
</div>

</section>

<section class="section reveal">

<div class="section-bg"
style="background-image:url('images/body.jpg')">
</div>

<div class="card glide">
<h2>Body Syndet Bar</h2>
<p>Pure cleansing experience.</p>
</div>

</section>

<section class="section reveal">

<div class="section-bg"
style="background-image:url('images/face.jpg')">
</div>

<div class="card glide">
<h2>Face Syndet Bar</h2>
<p>Precision skin cleansing.</p>
</div>

</section>

<script>

/* FOREGROUND GLIDE (existing effect) */

window.addEventListener("scroll",function(){

let scrolled=window.scrollY;

document.querySelectorAll(".glide").forEach(function(el){

let speed=.25;

el.style.transform=
"translateY("+(scrolled*-speed)+"px)";

});

});

/* CINEMATIC REVEAL */

const reveals=document.querySelectorAll(".reveal");

const observer=new IntersectionObserver((entries)=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("active");
}
});
},{
threshold:.25
});

reveals.forEach(el=>{
observer.observe(el);
});

</script>

</body>
</html>
